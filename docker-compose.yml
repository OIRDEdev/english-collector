version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    env_file:
      - .env


  frontend:
    build:
      context: ./polyglot-flow
    container_name: frontend
    ports:
      - "3000:80"
    env_file:
      - .env
    depends_on:
      - backend

  redis:
    image: redis:7
    ports:
      - "6379:6379"
